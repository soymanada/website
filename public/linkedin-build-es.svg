  <text x="836" y="396" font-size="15" fill="#FFFFFF" font-weight="700">Lanzamiento 🚀</text>
  <line x1="836" y1="403" x2="1107" y2="403" stroke="#C9953A" stroke-width="1" stroke-opacity="0.4"/>
