  <circle cx="95" cy="258" r="3" fill="#FFFFFF"/>
  <text x="113" y="255" font-size="10" fill="#C9953A" font-weight="700" letter-spacing="2">NOV 2024</text>
  <text x="113" y="270" font-size="13" fill="#FFFFFF" font-weight="700">Nace el grupo de WhatsApp</text>
  <text x="113" y="285" font-size="12" fill="#C4B0F0">"Manada a Canadá" — la idea se convierte en comunidad</text>
  <text x="113" y="300" font-size="12" fill="#C4B0F0">Migrantes hispanohablantes apoyándose entre sí</text>

