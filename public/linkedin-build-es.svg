  <text x="60" y="152" font-size="46" font-weight="800" fill="#7B4DC8" letter-spacing="-0.5">52 días de código.</text>

  <!-- Subtitle -->
  <text x="60" y="182" font-size="14" fill="#A07DE0">Directorio de confianza para migrantes latinoamericanos — la comunidad primero, el código después.</text>

