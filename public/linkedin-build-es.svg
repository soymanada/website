  <rect x="60" y="197" width="136" height="26" rx="13" fill="#3D1A78" stroke="#5B2D9E" stroke-width="1"/>
  <text x="128" y="214" font-size="12" fill="#C4B0F0" text-anchor="middle" font-weight="500">500+ migrantes</text>

  <rect x="208" y="197" width="160" height="26" rx="13" fill="#3D1A78" stroke="#5B2D9E" stroke-width="1"/>
  <text x="288" y="214" font-size="12" fill="#C4B0F0" text-anchor="middle" font-weight="500">18 meses comunidad</text>

  <rect x="380" y="197" width="122" height="26" rx="13" fill="#3D1A78" stroke="#5B2D9E" stroke-width="1"/>
  <text x="441" y="214" font-size="12" fill="#C4B0F0" text-anchor="middle" font-weight="500">304 commits</text>

  <rect x="514" y="197" width="116" height="26" rx="13" fill="#3D1A78" stroke="#5B2D9E" stroke-width="1"/>
  <text x="572" y="214" font-size="12" fill="#C4B0F0" text-anchor="middle" font-weight="500">52 días de build</text>

  <rect x="642" y="197" width="160" height="26" rx="13" fill="#3D1A78" stroke="#5B2D9E" stroke-width="1"/>
