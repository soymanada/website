<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#120826"/>
      <stop offset="100%" stop-color="#2D1057"/>
    </linearGradient>
    <linearGradient id="ctl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9953A"/>
      <stop offset="100%" stop-color="#7B4DC8"/>
    </linearGradient>
    <linearGradient id="div" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B2D9E" stop-opacity="0"/>
      <stop offset="25%" stop-color="#5B2D9E" stop-opacity="0.7"/>
      <stop offset="75%" stop-color="#5B2D9E" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#5B2D9E" stop-opacity="0"/>
