  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1110" cy="85" r="240" fill="#5B2D9E" fill-opacity="0.07"/>
  <circle cx="70" cy="565" r="180" fill="#7B4DC8" fill-opacity="0.05"/>

  <!-- Brand badge -->
  <rect x="60" y="34" width="158" height="24" rx="12" fill="#3D1A78" stroke="#5B2D9E" stroke-width="1"/>
  <text x="139" y="50" font-size="11" fill="#A07DE0" text-anchor="middle" font-weight="700" letter-spacing="2">🐾  SOYMANADA</text>

