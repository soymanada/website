  <circle cx="1130" cy="615" r="12" fill="#2D1057" fill-opacity="0.4"/>
  <circle cx="1110" cy="603" r="6" fill="#2D1057" fill-opacity="0.35"/>
  <circle cx="1122" cy="599" r="6" fill="#2D1057" fill-opacity="0.35"/>
