  <rect x="828" y="252" width="291" height="100" rx="8" fill="#2D1057" fill-opacity="0.85" stroke="#5B2D9E" stroke-width="1"/>
  <rect x="828" y="252" width="291" height="4" rx="2" fill="#8B5DCE"/>
