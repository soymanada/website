<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Rounded square background: iris-500 exacto del design system -->
  <rect width="32" height="32" rx="7" fill="#7B4DC8"/>

  <!-- Figura central (persona principal) -->
  <circle cx="16" cy="10" r="3.2" fill="#FAF8F4"/>
  <!-- Cuerpo central - arco superior que une los tres -->
  <path d="M10.5 22 C10.5 18.2 13 16 16 16 C19 16 21.5 18.2 21.5 22" 
        stroke="#FAF8F4" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- Figura izquierda -->
  <circle cx="9" cy="13" r="2.4" fill="#FAF8F4" opacity="0.75"/>
  <path d="M5 22 C5 19.4 6.8 17.8 9 17.8" 
        stroke="#FAF8F4" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.75"/>

  <!-- Figura derecha -->
  <circle cx="23" cy="13" r="2.4" fill="#FAF8F4" opacity="0.75"/>
  <path d="M27 22 C27 19.4 25.2 17.8 23 17.8" 
        stroke="#FAF8F4" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.75"/>
</svg>
